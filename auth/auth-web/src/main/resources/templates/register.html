<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <th:block th:replace="~{partial :: bootstrap}"/>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container page-shell">
    <main role="main">
        <div class="resto-card auth-card">
            <div class="resto-card-header text-center">
                <h1 class="page-title mb-1">Register</h1>
                <p class="page-subtitle">Create a new account to manage restaurant operations.</p>
            </div>
            <div class="card-body p-4">
                <div th:unless="${message == null}" class="alert alert-warning rounded-4" th:text="${message}"></div>

                <!--/*@thymesVar id="user" type="nbcc.auth.domain.UserRegistration"*/-->
                <form method="post" th:action="@{/register}" th:object="${user}" class="d-grid gap-3">
                    <div>
                        <label for="username" class="form-label">User Name</label>
                        <input id="username" th:field="*{username}" class="form-control" placeholder="Enter username"/>
                        <div class="text-danger small mt-1" th:errors="*{username}"></div>
                    </div>
                    <div>
                        <label for="email" class="form-label">Email</label>
                        <input id="email" th:field="*{email}" class="form-control" placeholder="Enter email"/>
                        <div class="text-danger small mt-1" th:errors="*{email}"></div>
                    </div>
                    <div>
                        <label for="password" class="form-label">Password</label>
                        <input id="password" th:field="*{password}" type="password" class="form-control" placeholder="Create password"/>
                        <div class="text-danger small mt-1" th:errors="*{password}"></div>
                    </div>
                    <input type="submit" value="Register" class="btn btn-resto-primary"/>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
