<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Edit Menu</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header">
            <h1 class="page-title">Edit Menu</h1>
            <p class="page-subtitle">Update the menu information and manage menu items.</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <form th:action="@{/menu/edit/{id}(id=${menu.id})}" method="post" th:object="${menu}">
                    <div th:replace="~{menu/fragments :: input}"></div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <a th:href="@{/menu/list}" class="btn btn-resto-outline">Back to Menus</a>
                        <input type="submit" value="Save Changes" class="btn btn-resto-primary"/>
                    </div>
                </form>
            </div>

            <div class="col-lg-5">
                <div th:replace="~{menu/item-fragments :: menuItemsSection}"></div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
