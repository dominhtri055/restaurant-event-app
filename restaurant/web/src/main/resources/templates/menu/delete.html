<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Delete Menu</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header">
            <h1 class="page-title">Delete Menu</h1>
            <p class="page-subtitle">Please confirm you want to delete this menu.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div th:replace="~{menu/fragments :: details}"></div>

                <form th:action="@{/menu/delete/{id}(id=${menu.id})}" method="post" class="mt-4">
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-danger">Delete Menu</button>
                        <a th:href="@{/menu/list}" class="btn btn-resto-outline">Cancel</a>

                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
