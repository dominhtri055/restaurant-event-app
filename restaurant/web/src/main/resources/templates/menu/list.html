<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <meta charset="UTF-8">
    <title>Menus</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
            <div>
                <h1 class="page-title">Menus</h1>
                <p class="page-subtitle">Search, view, and manage existing restaurant menus.</p>
            </div>

            <a th:if="${viewModel.canAdd}" th:href="@{/menu/create}" class="btn btn-resto-primary">
                + Add Menu
            </a>
        </div>

        <p th:if="${viewModel.message}"
           th:text="${viewModel.message}"
           class="alert alert-warning rounded-4"></p>

        <div class="resto-card mb-4">
            <div class="resto-card-header">
                <h5 class="mb-0 fw-bold">Search Menus</h5>
            </div>

            <div class="card-body p-4">
                <form th:action="@{/menu/list}" method="get" class="row g-3 align-items-end">
                    <div class="col-lg-8">
                        <label for="name" class="form-label">Menu Name</label>
                        <input id="name"
                               name="name"
                               type="text"
                               class="form-control"
                               th:value="${viewModel.name}"
                               placeholder="Search by menu name"/>
                    </div>

                    <div class="col-lg-4 d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-resto-primary">Search</button>
                        <a th:href="@{/menu/list}" class="btn btn-resto-outline">Clear Search</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="resto-card" th:unless="${viewModel.isEmpty()}">
            <div class="table-responsive">
                <table class="table resto-table align-middle">
                    <thead>
                    <tr>
                        <th>Menu Name</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="menu : ${viewModel.menus}">
                        <td>
                            <div class="fw-bold" th:text="${menu.name}">Sample Menu</div>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center flex-wrap gap-2 action-group">
                                <a th:href="@{/menu/{id}(id=${menu.id})}"
                                   class="btn btn-outline-secondary">
                                    View
                                </a>
                                <a th:if="${viewModel.canAdd}"
                                   th:href="@{/menu/edit/{id}(id=${menu.id})}"
                                   class="btn btn-outline-warning">
                                    Edit
                                </a>
                                <a th:if="${viewModel.canAdd}"
                                   th:href="@{/menu/delete/{id}(id=${menu.id})}"
                                   class="btn btn-outline-danger">
                                    Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="resto-section text-center py-5" th:if="${viewModel.isEmpty()}">
            <div class="empty-state-icon">📋</div>
            <h4 class="fw-bold">No Menus Found</h4>
            <p class="muted-note mb-3">Try adjusting your search or create a new menu.</p>
            <a th:if="${viewModel.canAdd}" th:href="@{/menu/create}" class="btn btn-resto-primary">+ Add Menu</a>
        </div>
    </main>
</div>
</body>
</html>
