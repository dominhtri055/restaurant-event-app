<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Create Event</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header">
            <h1 class="page-title">Create Event</h1>
            <p class="page-subtitle">Add a new restaurant event with schedule, pricing, and status.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <form th:action="@{/event/create}" method="post" th:object="${event}">
                    <div th:replace="~{event/fragments :: input}"></div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <a th:href="@{/event/list}" class="btn btn-resto-outline">Back to Events</a>
                        <input type="submit" value="Save Event" class="btn btn-resto-primary"/>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
