<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Fragments</title>
</head>
<body>

<!--/*@thymesVar id="event" type="nbcc.resto.dto.Event"*/-->

<th:block th:fragment="input" th:object="${event}">
    <div class="resto-card">
        <div class="resto-card-header">
            <h5 class="mb-0 fw-bold">Event Information</h5>
        </div>

        <div class="card-body p-4">
            <div class="alert alert-danger rounded-4" th:if="${#fields.hasGlobalErrors()}" role="alert">
                <strong>Error!</strong>
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label for="name" class="form-label">Event Name</label>
                <input id="name"
                       type="text"
                       th:field="*{name}"
                       class="form-control"
                       placeholder="Enter event name" />
                <div class="text-danger small mt-1" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description"
                          th:field="*{description}"
                          class="form-control"
                          rows="4"
                          placeholder="Enter event description"></textarea>
                <div class="text-danger small mt-1" th:errors="*{description}"></div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="startDate" class="form-label">Start Date</label>
                    <input id="startDate"
                           type="date"
                           name="startDate"
                           th:value="${event.startDate}"
                           class="form-control" />
                    <div class="text-danger small mt-1" th:errors="*{startDate}"></div>
                </div>

                <div class="col-md-6">
                    <label for="endDate" class="form-label">End Date</label>
                    <input id="endDate"
                           type="date"
                           name="endDate"
                           th:value="${event.endDate}"
                           class="form-control" />
                    <div class="text-danger small mt-1" th:errors="*{endDate}"></div>
                </div>

                <div class="col-md-6">
                    <label for="duration" class="form-label">Duration</label>
                    <input id="duration"
                           type="number"
                           th:field="*{duration}"
                           class="form-control"
                           placeholder="Enter duration" />
                    <div class="text-danger small mt-1" th:errors="*{duration}"></div>
                </div>

                <div class="col-md-6">
                    <label for="price" class="form-label">Price</label>
                    <input id="price"
                           type="number"
                           step="0.01"
                           th:field="*{price}"
                           class="form-control"
                           placeholder="Enter event price" />
                    <div class="text-danger small mt-1" th:errors="*{price}"></div>
                </div>
            </div>

            <div class="mt-3">
                <label for="menuId" class="form-label">Menu</label>
                <select id="menuId" th:field="*{menuId}" class="form-select">
                    <option value="">-- Select Menu --</option>
                    <option th:each="menu : ${menus}"
                            th:value="${menu.id}"
                            th:text="${menu.name}">
                    </option>
                </select>
                <div class="form-text">Optional when saving. Required only if the event is marked live.</div>
                <div class="text-danger small mt-1" th:errors="*{menuId}"></div>
            </div>

            <div class="form-check form-switch mt-4">
                <input id="active"
                       type="checkbox"
                       th:field="*{active}"
                       class="form-check-input" />
                <label for="active" class="form-check-label fw-semibold">Active Event</label>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="details" th:object="${event}">
    <div class="resto-card">
        <div class="resto-card-header">
            <h4 class="mb-0 fw-bold">Event Details</h4>
        </div>

        <div class="card-body p-4">
            <dl class="row mb-0">
                <dt class="col-sm-4 text-muted">Start Date:</dt>
                <dd class="col-sm-8" th:text="*{startDate}"></dd>

                <dt class="col-sm-4 text-muted">End Date:</dt>
                <dd class="col-sm-8" th:text="*{endDate}"></dd>

                <dt class="col-sm-4 text-muted">Name:</dt>
                <dd class="col-sm-8 fw-bold" th:text="*{name}"></dd>

                <dt class="col-sm-4 text-muted">Description:</dt>
                <dd class="col-sm-8" th:text="*{description}"></dd>

                <dt class="col-sm-4 text-muted">Duration:</dt>
                <dd class="col-sm-8" th:text="*{duration}"></dd>

                <dt class="col-sm-4 text-muted">Price:</dt>
                <dd class="col-sm-8" th:text="*{price}"></dd>

                <dt class="col-sm-4 text-muted">Menu:</dt>
                <dd class="col-sm-8"
                    th:text="*{menuName != null and !#strings.isEmpty(menuName) ? menuName : 'No menu selected'}"></dd>

                <dt class="col-sm-4 text-muted">Created At:</dt>
                <dd class="col-sm-8"
                    th:text="*{createdAt != null ? #temporals.format(createdAt, 'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></dd>

                <dt class="col-sm-4 text-muted">Last Updated:</dt>
                <dd class="col-sm-8"
                    th:text="*{updatedAt != null ? #temporals.format(updatedAt, 'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></dd>
            </dl>
        </div>
    </div>
</th:block>

</body>
</html>
