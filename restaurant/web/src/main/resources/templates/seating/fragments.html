<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seating Fragments</title>
</head>
<body>

<!--/*@thymesVar id="seating" type="nbcc.resto.dto.Seating"*/-->
<th:block th:fragment="input" th:object="${seating}">
    <div class="resto-card">
        <div class="resto-card-header">
            <h5 class="mb-0 fw-bold">Seating Information</h5>
        </div>

        <div class="card-body p-4">
            <div class="alert alert-danger rounded-4" th:if="${#fields.hasGlobalErrors()}" role="alert">
                <strong>Error!</strong>
                <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            </div>

            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input id="name" type="text" th:field="*{name}" class="form-control"/>
                <div class="text-danger small mt-1" th:errors="*{name}"></div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="startTime" class="form-label">Start Time</label>
                    <input id="startTime" type="datetime-local" th:field="*{startTime}" class="form-control"/>
                    <div class="text-danger small mt-1" th:errors="*{startTime}"></div>
                </div>

                <div class="col-md-6">
                    <label for="duration" class="form-label">Duration</label>
                    <input id="duration" type="number" th:field="*{duration}" class="form-control"/>
                    <div class="text-danger small mt-1" th:errors="*{duration}"></div>
                </div>
            </div>

            <div class="mt-3">
                <label class="form-label">Event</label>

                <div class="resto-section p-3">
                    <div th:if="${events == null or #lists.isEmpty(events)}" class="text-muted">
                        No events available
                    </div>

                    <div class="form-check mb-2" th:each="event : ${events}">
                        <input class="form-check-input"
                               type="radio"
                               th:field="*{eventId}"
                               th:value="${event.id}"
                               th:id="'event-' + ${event.id}" />

                        <label class="form-check-label" th:for="'event-' + ${event.id}">
                            <span th:text="${event.name}"></span>
                        </label>
                    </div>
                </div>

                <div class="text-danger small mt-1" th:errors="*{eventId}"></div>
            </div>

            <div class="mt-3" th:if="*{tableIds != null and !tableIds.isEmpty()}">
                <label class="form-label">Assigned Tables</label>
                <div class="resto-section p-3">
                    <span class="badge-soft me-2" th:each="tableId : *{tableIds}" th:text="'Table Id: ' + ${tableId}"></span>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="details" th:object="${seating}">
    <div class="resto-card">
        <div class="resto-card-header">
            <h4 class="mb-0 fw-bold">Seating Details</h4>
        </div>

        <div class="card-body p-4">
            <dl class="row mb-0">
                <dt class="col-sm-4 text-muted">Id</dt>
                <dd class="col-sm-8" th:text="*{id}"></dd>

                <dt class="col-sm-4 text-muted">Event Id</dt>
                <dd class="col-sm-8" th:text="*{eventId}"></dd>

                <dt class="col-sm-4 text-muted">Event Name</dt>
                <dd class="col-sm-8" th:text="*{eventName}"></dd>

                <dt class="col-sm-4 text-muted">Name</dt>
                <dd class="col-sm-8 fw-bold" th:text="*{name}"></dd>

                <dt class="col-sm-4 text-muted">Start Time</dt>
                <dd class="col-sm-8" th:text="*{startTime}"></dd>

                <dt class="col-sm-4 text-muted">Duration</dt>
                <dd class="col-sm-8" th:text="*{duration}"></dd>

                <dt class="col-sm-4 text-muted">Created Date</dt>
                <dd class="col-sm-8"
                    th:text="${seating.createdDate != null ? #temporals.format(seating.createdDate, 'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></dd>

                <dt class="col-sm-4 text-muted">Updated At</dt>
                <dd class="col-sm-8"
                    th:text="${seating.updatedAt != null ? #temporals.format(seating.updatedAt, 'yyyy-MM-dd HH:mm:ss') : 'N/A'}"></dd>

                <dt class="col-sm-4 text-muted">Tables</dt>
                <dd class="col-sm-8">
                    <span th:if="*{tableIds != null and !tableIds.isEmpty()}" th:text="*{tableIds}"></span>
                    <span th:if="*{tableIds == null or tableIds.isEmpty()}" class="text-muted">No tables assigned</span>
                </dd>
            </dl>
        </div>
    </div>
</th:block>

</body>
</html>
