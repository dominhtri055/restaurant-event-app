<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Delete Seating</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header">
            <h1 class="page-title">Delete Seating</h1>
            <p class="page-subtitle">Please confirm you want to delete this seating.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div th:replace="~{seating/fragments :: details}"></div>

                <form th:action="@{/seating/delete/{id}(id=${seating.id})}" method="post" class="mt-4">
                    <div class="d-flex flex-wrap gap-2">
                        <a th:href="@{/seating/list}" class="btn btn-resto-outline">Back to Seatings</a>
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
