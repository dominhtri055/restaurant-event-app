<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Edit Seating</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header">
            <h1 class="page-title">Edit Seating</h1>
            <p class="page-subtitle">Update the seating information.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <form th:action="@{/seating/edit/{id}(id=${seating.id})}" method="post" th:object="${seating}">
                    <div th:replace="~{seating/fragments :: input}"></div>

                    <div th:if="${seating.tableIds != null}">
                        <input type="hidden"
                               th:each="tableId : ${seating.tableIds}"
                               name="tableIds"
                               th:value="${tableId}" />
                    </div>

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <a th:href="@{/seating/list}" class="btn btn-resto-outline">Back to Seatings</a>
                        <input type="submit" value="Save Changes" class="btn btn-resto-primary"/>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
