<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Create Seating</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header">
            <h1 class="page-title">Create Seating</h1>
            <p class="page-subtitle">Set up a seating schedule and assign it to an event and tables.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="resto-card">
                    <div class="resto-card-header">
                        <h5 class="mb-0 fw-bold">Seating Information</h5>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/seating/create}" method="post" th:object="${seating}">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input id="name"
                                       type="text"
                                       th:field="*{name}"
                                       class="form-control"
                                       placeholder="Enter seating name"/>
                                <div class="text-danger small mt-1" th:errors="*{name}"></div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="startTime" class="form-label">Start Time</label>
                                    <input id="startTime"
                                           type="datetime-local"
                                           th:field="*{startTime}"
                                           class="form-control"/>
                                    <div class="text-danger small mt-1" th:errors="*{startTime}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label for="duration" class="form-label">Duration</label>
                                    <input id="duration"
                                           type="number"
                                           th:field="*{duration}"
                                           class="form-control"
                                           placeholder="Enter duration"/>
                                    <div class="text-danger small mt-1" th:errors="*{duration}"></div>
                                </div>
                            </div>

                            <div class="mt-3">
                                <label class="form-label">Event</label>

                                <div class="resto-section p-3">
                                    <div th:if="${events == null or #lists.isEmpty(events)}" class="text-muted">
                                        No events available
                                    </div>

                                    <div class="form-check mb-2" th:each="event : ${events}">
                                        <input class="form-check-input"
                                               type="radio"
                                               th:field="*{eventId}"
                                               th:value="${event.id}"
                                               th:id="'event-' + ${event.id}" />

                                        <label class="form-check-label" th:for="'event-' + ${event.id}">
                                            <span th:text="${event.name}"></span>
                                        </label>
                                    </div>
                                </div>

                                <div class="text-danger small mt-1" th:errors="*{eventId}"></div>
                            </div>

                            <div class="mt-3">
                                <label class="form-label">Tables</label>

                                <div class="resto-section p-3">
                                    <div th:if="${tables == null or #lists.isEmpty(tables)}" class="text-muted">
                                        No tables available
                                    </div>

                                    <div class="form-check mb-2" th:each="table : ${tables}">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               th:field="*{tableIds}"
                                               th:value="${table.id}"
                                               th:id="'table-' + ${table.id}"/>

                                        <label class="form-check-label" th:for="'table-' + ${table.id}">
                                            <span th:text="${table.name != null and !table.name.isBlank() ? table.name : 'Table ' + table.id}"></span>
                                            -
                                            Capacity:
                                            <span th:text="${table.capacity}"></span>
                                        </label>
                                    </div>
                                </div>

                                <div class="text-danger small mt-1" th:errors="*{tableIds}"></div>
                            </div>

                            <div class="d-flex flex-wrap gap-2 mt-4">
                                <a th:href="@{/seating/list}" class="btn btn-resto-outline">Back to Seatings</a>
                                <input type="submit" value="Save Seating" class="btn btn-resto-primary"/>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
