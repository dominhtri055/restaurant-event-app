<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <meta charset="UTF-8">
    <title>Edit Table</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container page-shell">
    <main role="main">
        <div class="page-header">
            <h1 class="page-title">Edit Table</h1>
            <p class="page-subtitle">Update the table information and save your changes.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-7">
                <form th:action="@{/table/edit/{id}(id=${table.id})}" method="post" th:object="${table}">
                    <div th:replace="~{table/fragments :: input}"></div>
                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <a th:href="@{/table}" class="btn btn-resto-outline">Back to Tables</a>
                        <input type="submit" value="Save Changes" class="btn btn-resto-primary"/>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
